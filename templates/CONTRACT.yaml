# CONTRACT.yaml - 子系统交互契约
# 版本: 1.0.0

version: "1.0.0"
subsystem_id: "[subsystem-id]"
last_updated: "YYYY-MM-DD"

# ============================================================================
# 提供的服务
# ============================================================================

provides:
  - service_id: "SVC-001"
    name: "[服务名称]"
    description: "[服务描述]"
    version: "1.0.0"

    # 输入Schema
    input_schema:
      type: object
      required:
        - "[必填字段1]"
        - "[必填字段2]"
      properties:
        "[字段1]":
          type: string
          description: "[字段描述]"
        "[字段2]":
          type: object
          description: "[字段描述]"
          properties:
            "[子字段]":
              type: string

    # 输出Schema
    output_schema:
      type: object
      properties:
        "[输出字段1]":
          type: string
          description: "[字段描述]"
        "[输出字段2]":
          type: array
          items:
            type: object

    # 服务级别协议
    sla:
      response_time_minutes: 30
      availability: 0.99
      error_rate_max: 0.01

    # 依赖
    dependencies:
      - subsystem: "[依赖子系统]"
        service: "[依赖服务]"
        required: true

  - service_id: "SVC-002"
    name: "[服务名称2]"
    description: "[服务描述]"
    # ... 类似结构

# ============================================================================
# 需要的服务
# ============================================================================

consumes:
  - service_id: "[服务ID]"
    provider: "[提供方子系统]"
    description: "[需求描述]"
    version_constraint: ">=1.0.0"
    frequency: "on-demand"  # on-demand, daily, hourly, real-time
    required: true  # true=必须, false=可选

  - service_id: "[服务ID2]"
    provider: "[提供方子系统2]"
    # ... 类似结构

# ============================================================================
# 事件订阅
# ============================================================================

events:
  # 订阅的事件
  subscribes:
    - event: "[子系统].[事件类型]"
      action: "[触发动作]"
      description: "[事件描述]"

    - event: "[子系统].[事件类型2]"
      action: "[触发动作]"

  # 发布的事件
  publishes:
    - event: "[本子系统].[事件类型]"
      description: "[事件描述]"
      payload:
        "[字段1]":
          type: string
          description: "[字段描述]"
        "[字段2]":
          type: number
          description: "[字段描述]"

# ============================================================================
# 数据共享
# ============================================================================

data_sharing:
  # 提供的数据
  provides_data:
    - name: "[数据集名称]"
      description: "[数据描述]"
      format: "json"  # json, yaml, markdown, binary
      access_level: "internal"  # public, internal, restricted
      update_frequency: "on-change"  # on-change, daily, real-time

  # 需要的数据
  requires_data:
    - name: "[数据集名称]"
      provider: "[提供方子系统]"
      purpose: "[用途说明]"
      access_level_needed: "internal"

# ============================================================================
# 质量保证
# ============================================================================

quality:
  # 响应时间承诺
  response_time:
    urgent: "15m"  # 紧急请求
    normal: "1h"   # 普通请求
    low: "4h"      # 低优先级请求

  # 错误处理
  error_handling:
    retry_count: 3
    retry_delay_seconds: 30
    escalation_after_failures: 3

  # 监控指标
  metrics:
    - name: "response_time"
      type: "histogram"
      description: "请求响应时间"
    - name: "success_rate"
      type: "gauge"
      description: "请求成功率"
    - name: "error_count"
      type: "counter"
      description: "错误计数"

# ============================================================================
# 变更历史
# ============================================================================

changelog:
  - version: "1.0.0"
    date: "YYYY-MM-DD"
    author: "[作者]"
    changes:
      - "初始版本"

  - version: "0.9.0"
    date: "YYYY-MM-DD"
    author: "[作者]"
    changes:
      - "草稿版本"
    status: "deprecated"

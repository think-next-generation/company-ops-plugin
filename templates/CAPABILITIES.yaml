# CAPABILITIES.yaml - 子系统能力定义
# 版本: 1.0.0

version: "1.0.0"
subsystem_id: "[subsystem-id]"
last_updated: "YYYY-MM-DD"

# ============================================================================
# 能力定义
# ============================================================================

capabilities:
  # --------------------------------------------------------------------------
  # 能力 1
  # --------------------------------------------------------------------------
  - id: "CAP-001"
    name: "[能力名称]"
    description: "[能力描述]"

    # 技能列表
    skills:
      - "[技能1]"
      - "[技能2]"
      - "[技能3]"

    # 使用的工具
    tools:
      - name: "[工具名称]"
        type: "ai"  # ai, software, service
        usage: "[用途描述]"
      - name: "[工具名称2]"
        type: "software"
        usage: "[用途描述]"

    # 输入要求
    inputs:
      - name: "[输入1]"
        type: "string"
        required: true
        description: "[描述]"
      - name: "[输入2]"
        type: "object"
        required: false
        description: "[描述]"

    # 输出承诺
    outputs:
      - name: "[输出1]"
        type: "string"
        description: "[描述]"
      - name: "[输出2]"
        type: "file"
        description: "[描述]"

    # 质量指标
    quality_metrics:
      - name: "[指标1]"
        type: "percentage"
        target: ">=80%"
        description: "[描述]"
      - name: "[指标2]"
        type: "time"
        target: "<30m"
        description: "[描述]"

    # 前置条件
    preconditions:
      - "[前置条件1]"
      - "[前置条件2]"

    # 后置条件
    postconditions:
      - "[后置条件1]"
      - "[后置条件2]"

    # 相关文档
    documentation: "./capabilities/[capability-name].md"

    # 状态
    status: "planned"  # planned, active, deprecated

  # --------------------------------------------------------------------------
  # 能力 2
  # --------------------------------------------------------------------------
  - id: "CAP-002"
    name: "[能力名称2]"
    description: "[能力描述]"
    # ... 类似结构

# ============================================================================
# 能力成熟度等级
# ============================================================================

maturity_levels:
  - level: 1
    name: "基础"
    description: "能够完成基本任务，需要指导"
    criteria:
      - "可以执行定义好的任务"
      - "遇到异常需要人工介入"
      - "输出质量不稳定"

  - level: 2
    name: "熟练"
    description: "能够独立完成任务，质量稳定"
    criteria:
      - "可以独立完成复杂任务"
      - "能够处理常见异常"
      - "输出质量稳定可靠"

  - level: 3
    name: "专家"
    description: "能够处理复杂场景，指导他人"
    criteria:
      - "可以处理未定义的复杂场景"
      - "能够优化和改进流程"
      - "可以指导其他Agent"

# ============================================================================
# 当前能力成熟度
# ============================================================================

current_maturity:
  CAP-001: 0  # 0表示尚未实现
  CAP-002: 0
  # ...

# ============================================================================
# 能力发展计划
# ============================================================================

development_plan:
  - capability_id: "CAP-001"
    current_level: 0
    target_level: 2
    timeline: "2026-Q2"
    dependencies:
      - "完成基础培训"
      - "积累执行经验"

  - capability_id: "CAP-002"
    current_level: 0
    target_level: 1
    timeline: "2026-Q2"
    dependencies:
      - "CAP-001 达到 level 1"

# ============================================================================
# 能力使用统计
# ============================================================================

usage_statistics:
  period: "2026-Q2"
  capabilities:
    - id: "CAP-001"
      invocations: 0
      success_rate: 0
      avg_duration_minutes: 0
    - id: "CAP-002"
      invocations: 0
      success_rate: 0
      avg_duration_minutes: 0
